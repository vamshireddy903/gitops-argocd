steps:
  # Step 1: Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "asia-south1-docker.pkg.dev/test-vamshi/argocd-repo/gitops-dashboard:$SHORT_SHA",
        "."
      ]

  # Step 2: Push Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "asia-south1-docker.pkg.dev/test-vamshi/argocd-repo/gitops-dashboard:$SHORT_SHA"
      ]

  # Step 3: Tag latest
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "tag",
        "asia-south1-docker.pkg.dev/test-vamshi/argocd-repo/gitops-dashboard:$SHORT_SHA",
        "asia-south1-docker.pkg.dev/test-vamshi/argocd-repo/gitops-dashboard:latest"
      ]

  # Step 4: Push latest
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "asia-south1-docker.pkg.dev/test-vamshi/argocd-repo/gitops-dashboard:latest"
      ]

  # ⭐ Step 5: Update Kubernetes YAML with new image
  - name: "gcr.io/cloud-builders/gcloud"
    entrypoint: bash
    args:
      - -c
      - |
        sed -i "s|image: asia-south1-docker.pkg.dev/test-vamshi/argocd-repo/gitops-dashboard:.*|image: asia-south1-docker.pkg.dev/test-vamshi/argocd-repo/gitops-dashboard:$SHORT_SHA|g" k8s/deployment-svc.yaml

  # ⭐ Step 6: Commit and push updated YAML back to GitHub
  - name: "gcr.io/cloud-builders/git"
    entrypoint: bash
    args:
      - -c
      - |
        git config user.email "cloudbuild@google.com"
        git config user.name "cloudbuild"

        git add k8s/deployment-svc.yaml
        git commit -m "Update image tag to $SHORT_SHA [CI skip]" || echo "No changes to commit"
        git push origin main

images:
  - "asia-south1-docker.pkg.dev/test-vamshi/argocd-repo/gitops-dashboard:$SHORT_SHA"
  - "asia-south1-docker.pkg.dev/test-vamshi/argocd-repo/gitops-dashboard:latest"

options:
  logging: CLOUD_LOGGING_ONLY
